services:
  - type: web
    name: livewire
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/bills.db
      - key: OPENROUTER_API_KEY
        sync: false
    disk:
      name: livewire-data
      mountPath: /app/data
      sizeGB: 1
